name: Deploy Infrastructure - UAT

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::688567266187:role/GitHubActions-uat
          aws-region: us-east-1

      - name: Go deps
        run: go mod download

      - name: CDK Deploy
        env:
          STAGE: uat
        run: cdk deploy --all --require-approval never
